[build-system]
requires = ["poetry-core>=1.8.0", "setuptools", "wheel"]
build-backend = "poetry.core.masonry.api"

# -----------------------------------------------------------------
# PEP 621 metadata
# -----------------------------------------------------------------
[project]
name = "projectviolencedocs"
version = "0.1.0"
description = "Documentation for Project Violence"
readme = "README.md"
license = {text = "CC-BY-SA-4.0"}
# licence files = ["LICENSE"]  #OPTIONAL, points to a licence file
authors = [
    {name = "Danweel", email = "daniil.woodland@pm.me"},
    {name = "Community"}          # optional second author
]

# ---- core runtime dependencies (inside the same [project] table) ----
requires-python = ">=3.11"   # Once this line is present, the resolver no longer falls back to the historic “>=2.7,<2.8” default.

# dependencies = [
#    "sphinx>=7.2",
#    "sphinx-rtd-theme>=2.0,<3.0",
#    "readthedocs-build>=2.0"
#]
# Not needed here if Poetry is handling them (see the yaml)

# -----------------------------------------------------------------
# Poetry Groups
# -----------------------------------------------------------------
 [tool.poetry]          # We don't need this group with autodoc2 - enable if using standard autodoc
 package-mode = false   # ← tells Poetry not to expect a Python package (for now, we can add the script optionally later)
 packages = []          # ← no Python package to install

[tool.poetry.extras]   # ← this defines the dependancies to install, then 'dependancy groups' below define the minimum requirements for each item.
docs = [
    "sphinx",
    "readthedocs-build",
    "sphinxcontrib-mermaid",
    "sphinx-notfound-page",
    "groundwork-sphinx-theme",
    "myst-parser"
]
dev = [
    "sphinx",
    "readthedocs-build",
    "sphinxcontrib-mermaid",
    "sphinx-notfound-page",
    "groundwork-sphinx-theme",
    "myst-parser",
    "ruff"
]


# -----------------------------------------------------------------
# Poetry Dependency Groups
# -----------------------------------------------------------------

[tool.poetry.group.docs.dependencies]  # use poetry install --with docs for regular contributors (light, strips out unnecessary tools)
sphinx = "^8.0"
readthedocs-build = "^2.0"
sphinxcontrib-mermaid = "^2.0.1"
sphinx-notfound-page = "^1.0.0"
groundwork-sphinx-theme = "^1.1.1"     # because these are defined in the Core dependencies, this isn't strictly needed, but I'm using it in the setup script for clarity.
myst-parser = "^5.0.0"                 # Keep myst_parser if you want full .md page support

[tool.poetry.group.dev.dependencies]   # replaces deprecated [dev-dependencies], use poetry install --with dev to install everything required to maintain the Read the Docs project.
sphinx = "^8.0"
readthedocs-build = "^2.0"
sphinxcontrib-mermaid = "^2.0.1"
sphinx-notfound-page = "^1.0.0"
groundwork-sphinx-theme = "^1.1.1"
myst-parser = "^5.0.0"                 # Keep myst_parser if you want full .md page support

# pytest = "^8.0"                      # Optional unless we add python code. Don't forget to add it back to tool.poetry.extras
ruff = "^0.6"                          # Python linter, can help with .bpy files (not just for Python Libraries)