[build-system]
requires = ["poetry-core>=1.8.0"]
build-backend = "poetry.core.masonry.api"

# -----------------------------------------------------------------
# PEP 621 metadata
# -----------------------------------------------------------------
[project]
name = "projectviolencedocs"
version = "0.1.0"
description = "Documentation for Project Violence"
readme = "README.md"
license = "MIT"
# licence files = ["LICENSE"]  #OPTIONAL, points to a licence file
authors = [
    {name = "Danweel", email = "daniil.woodland@pm.me"},
    {name = "Community"}          # optional second author
]
requires-python = ">=3.9"           # mirrors Poetry’s python requirement
dependencies = [                    # PEP 621‑style runtime deps
    "sphinx>=7.2",
    "sphinx-rtd-theme>=2.0"
]

# -----------------------------------------------------------------
# Poetry‑specific configuration (kept for compatibility)
# -----------------------------------------------------------------
[tool.poetry]
# `package-mode` is a Setuptools‑specific option; Poetry ignores it,
# but we keep it here in case other tools still read it.
package-mode = false   # docs-only repo, disables packaging

# -----------------------------------------------------------------
# Poetry dependency groups (new format)
# -----------------------------------------------------------------
[tool.poetry.group.docs.dependencies]  # use poetry install --with docs for regular contributors (light, strips out unnecessary tools)
sphinx = "^7.2"
sphinx-rtd-theme = "^2.0"
readthedocs-build = "^2.0"

[tool.poetry.group.dev.dependencies]   # replaces deprecated [dev-dependencies]
sphinx = "^7.2"
sphinx-rtd-theme = "^2.0"
readthedocs-build = "^2.0"             # use poetry install --with dev for all additional tools (heavier) 

# For now they are the same, but additional tools I find I need on the dev end will be added eventually (if necessary). 
# This is just a note about options for now.


# -----------------------------------------------------------------
# OPTIONAL: keep the old Poetry block for tools that still expect it
# -----------------------------------------------------------------
# If you want Poetry to continue reading the dependencies from its
# legacy section, add them to `project.dynamic` and leave the block
# unchanged.  Otherwise you can delete the whole block.