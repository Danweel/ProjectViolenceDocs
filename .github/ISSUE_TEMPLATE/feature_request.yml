name: Feature Request
description: Suggest a new feature or enhancement for the tool or documentation.
title: "[FEATURE]: "
labels: ["C-class", "feature request"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature! Please describe your idea below.

  - type: checkboxes
    id: problem-related
    attributes:
      label: Is this related to a problem?
      options:
        - label: Yes, this is related to a problem I'm experiencing
          required: false

  - type: textarea
    id: problem
    attributes:
      label: Describe the Problem (Optional)
      description: If this is related to a problem, describe it here.
      placeholder: "I'm always frustrated when I have to manually switch layers for every frame..."
    validations:
      required: false

  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: What would you like to see happen?
      placeholder: "It would be great if the tool could automatically detect which layer I'm drawing on..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered (Optional)
      description: Have you considered any alternative solutions?
      placeholder: "I've tried using Blender's built-in layer switching, but..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context (Optional)
      description: Any other context, screenshots, or references?
      placeholder: "This feature exists in [Tool X] and works like..."